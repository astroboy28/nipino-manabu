<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancel Account Deletion — Nipino-Manabu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#F2F2F2;color:#111;min-height:100vh}
.topbar{background:#CC0000;padding:16px 20px;display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:#fff;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  font-weight:700;color:#CC0000;font-family:serif}
.logo-text{color:#fff;font-size:16px;font-weight:700}
.logo-text span{opacity:.75}
.page{max-width:420px;margin:0 auto;padding:24px 16px}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#666;margin-bottom:24px;line-height:1.5}
.action-btn{width:100%;padding:13px;border-radius:8px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;background:#CC0000;color:#fff;
  transition:opacity .15s}
.action-btn:disabled{opacity:.5;cursor:not-allowed}
.status-box{border-radius:8px;padding:14px 16px;font-size:13px;
  margin-bottom:16px;display:none;line-height:1.5}
.status-box.show{display:block}
.status-success{background:#EAF3DE;border:1px solid #97C459;color:#27500A}
.status-error{background:#FCEBEB;border:1px solid #F09595;color:#791F1F}
.status-loading{background:#E6F1FB;border:1px solid #85B7EB;color:#0C447C}
.back-link{display:block;text-align:center;color:#CC0000;font-size:13px;
  margin-top:20px;text-decoration:none}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo-mark">日</div>
  <div class="logo-text">Nipino<span>-Manabu</span></div>
</div>
<div class="page">
  <h1>Cancel account deletion</h1>
  <p class="sub">Changed your mind? Confirm below to keep your Nipino-Manabu account — nothing will be deleted.</p>

  <div id="statusBox" class="status-box"></div>

  <button type="button" class="action-btn" id="cancelBtn">Cancel my deletion</button>

  <a class="back-link" href="https://nipino-manabu.com">Back to Nipino-Manabu</a>
</div>

<script>
const API = 'https://api.nipino-manabu.com/v1';
const token = new URLSearchParams(window.location.search).get('token');
const cancelBtn = document.getElementById('cancelBtn');
const statusBox = document.getElementById('statusBox');

function showStatus(kind, msg) {
  statusBox.className = 'status-box show status-' + kind;
  statusBox.textContent = msg;
}

if (!token) {
  cancelBtn.style.display = 'none';
  showStatus('error', 'This link is missing its cancellation token. Please use the link from your deletion-scheduled email.');
}

cancelBtn.addEventListener('click', async () => {
  cancelBtn.disabled = true;
  cancelBtn.textContent = 'Cancelling…';
  statusBox.className = 'status-box';

  try {
    const res  = await fetch(`${API}/account?action=confirm-cancel-deletion`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const body = await res.json();
    if (res.ok && body.success) {
      showStatus('success', 'Your account deletion has been cancelled. Your account is fully restored — sign in normally in the app.');
      cancelBtn.style.display = 'none';
    } else {
      showStatus('error', body.message || 'This link is invalid or has expired.');
      cancelBtn.disabled = false;
      cancelBtn.textContent = 'Cancel my deletion';
    }
  } catch (err) {
    showStatus('error', 'Network error. Please check your connection and try again.');
    cancelBtn.disabled = false;
    cancelBtn.textContent = 'Cancel my deletion';
  }
});
</script>
</body>
</html>
