name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  php-lint:
    name: PHP lint (backend/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Lint every changed-or-all PHP file
        run: |
          set -e
          find backend -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
